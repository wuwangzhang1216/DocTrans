version: 1.0
runtime: python3
build:
  commands:
    build:
      - pip install google-genai pymupdf python-pptx python-docx pdfplumber reportlab python-dotenv chardet Pillow rich
      - curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
      - apt-get install -y nodejs
      - npm install --production
run:
  command: node worker.js
  env:
    - name: NODE_ENV
      value: production
